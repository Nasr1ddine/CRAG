services:
  crag-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CRAG_API_PORT:-8001}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      COLLECTION_NAME: ${COLLECTION_NAME:-crag_docs}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      TOP_K: ${TOP_K:-5}
      MAX_REWRITE_ITERATIONS: ${MAX_REWRITE_ITERATIONS:-2}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
      GRADER_MODEL: ${GRADER_MODEL:-gpt-4o-mini}
      GENERATOR_MODEL: ${GENERATOR_MODEL:-gpt-4o}
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
