# Local Qdrant for development / smoke tests.
# Usage: docker compose up -d
# Then set QDRANT_URL=http://127.0.0.1:6333 (and leave QDRANT_API_KEY empty).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
