services:
  - type: web
    name: crag-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: COLLECTION_NAME
        value: crag_docs
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: TOP_K
        value: "5"
      - key: MAX_REWRITE_ITERATIONS
        value: "2"
      - key: GRADER_MODEL
        value: gpt-4o-mini
      - key: GENERATOR_MODEL
        value: gpt-4o
